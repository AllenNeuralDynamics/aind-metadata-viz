name: "Dynamic Foraging"

query:
  # Generated 2026-03-22 by querying DocDB for raw behavior_* assets with
  # session_type in [Uncoupled Baiting, Coupled Baiting,
  # Uncoupled Without Baiting, Coupled Without Baiting] over 6 months.
  # Re-run this query periodically to capture new projects.
  docdb_project_names:
    - "Genetic Perturbation Platform"
    - "Discovery-Neuromodulator circuit dynamics during foraging - Subproject 3 Fiber Photometry Recordings of NM Release During Behavior"
    - "Striatum"
    - "AIBS WB AAV Toolbox"
    - "Discovery-Neuromodulator circuit dynamics during foraging - Subproject 1 Electrophysiological Recordings from NM Neurons During Behavior"
    - "Discovery Neuromodulation - Subproject 3 Fiber Photometry Recordings of NM Release During Behavior"
    - "Behavior Platform"
    - "Thalamus in the middle - Project 4 Frontal cortical dynamics and cognitive behaviors"
    - "Cell Type LUT"
    - "Thalamus - Project 4 Frontal cortical dynamics and cognitive behaviors"
    - "Discovery Neuromodulation - Subproject 1 Electrophysiological Recordings from NM Neurons During Behavior"
    - "Discovery Brain Wide Circuit Dynamics"
    - "Genetic Perturbation Project"
  docdb_versions:
    - v1
    - v2
  # dts_job_types: dict mapping job type name → expected derived pipeline modalities
  dts_job_types:
    dynamic_foraging_behavior_and_fiber:
      expected_pipelines: [behavior, fib]
    dynamic_foraging_behavior_only:
      expected_pipelines: [behavior]
    dynamic_foraging_compression:
      expected_pipelines: [behavior]
    dynamic_foraging:
      expected_pipelines: [behavior]
  # use_manifests: read Alex Piet's daily manifest snapshots from MANIFEST_DIR
  # to surface sessions that never reached the DTS.
  use_manifests: true

# Modalities that must be present on a raw record for it to count as a
# Dynamic Foraging session. Filters out non-behavior records (e.g. SmartSPM)
# that share the same DocDB project names.
required_modalities:
  - behavior

# Modalities collected but never expected to have standalone derived output.
# Used as fallback when no DTS job type is known for a session.
no_derived_expected:
  - behavior-videos

# One entry per derived asset column rendered in the session table.
pipelines:
  - label: "Derived Asset Metadata"
    modalities: [behavior, fib, fiber, behavior-videos]
    co_pipeline_capsule_id: "250cf9b5-f438-4d31-9bbb-ba29dab47d56"
    co_log_col: "CO Pipeline Log"
    co_asset_col: "CO Derived Asset"
