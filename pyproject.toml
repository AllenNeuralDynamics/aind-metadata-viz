[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "aind-metadata-viz"
description = "Generated from aind-library-template"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Allen Institute for Neural Dynamics"}
]
classifiers = [
    "Programming Language :: Python :: 3"
]
readme = "README.md"
dynamic = ["version"]

dependencies = [
    'pydantic<=2.11.0',
    'fastapi',
    'uvicorn[standard]',
    'aind-data-schema>=2.6.0,<3',
    'aind-data-access-api[docdb]',
    'zombie-squirrel>=0.29.0,<1',
    'aind-metadata-validator>=0.11.6,<2',
    'aind-metadata-upgrader>=0.15.23,<1',
    'numpy<2.0',
    'biodata-query @ git+https://github.com/AllenNeuralDynamics/biodata-query.git@v0.6.1',
    'boto3',
    'requests',
]

[project.optional-dependencies]
dev = [
    'pytest',
    'httpx',
    'coverage',
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "aind_metadata_viz.__version__"}

[tool.black]
line-length = 79
target_version = ['py36']
exclude = '''

(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | build
    | dist
  )/
  | .gitignore
)
'''

[tool.coverage.run]
omit = ["*__init__*"]
source = ["aind_metadata_viz", "tests"]

[tool.coverage.report]
exclude_lines = [
    "if __name__ == .__main__.:",
    "from",
    "import",
    "pragma: no cover"
]
fail_under = 100

[tool.isort]
line_length = 79
profile = "black"

[tool.interrogate]
exclude = ["setup.py", "docs", "build"]
fail-under = 100
